<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ciudad de Los Niños - Sistema de Tickets Internos</title>

<link rel="icon" href="https://www.ciudaddelosninoscr.org/pics/header-logo.png">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Montserrat',sans-serif;
}

body{
background:#f5f5f5;
color:#002060;
}

header{
background:#002060;
padding:1rem;
text-align:center;
}

.section{
padding:3rem;
max-width:900px;
margin:auto;
}

.formulario-contacto{
background:white;
padding:2rem;
border-radius:8px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
border-top:4px solid #e61610;
}

form{
display:flex;
flex-direction:column;
gap:1rem;
}

input,textarea,select{
padding:10px;
border:1px solid #ccc;
border-radius:4px;
}

textarea{
min-height:140px;
}

.botones{
background:#e61610;
color:white;
border:none;
padding:10px;
cursor:pointer;
font-weight:600;
}

.botones:hover{
background:#c01209;
}

.centrado{
text-align:center;
font-weight:600;
}

</style>
</head>

<body>

<header>
<img src="https://www.ciudaddelosninoscr.org/pics/header-logo.png" width="260">
</header>

<div class="section">

<h2>Sistema de Tickets Internos</h2>
<p>Complete todos los campos</p>

<div class="formulario-contacto">

<form id="form1">

<label>Nombre Completo</label>
<input id="nombreTxt" name="nombre" required>

<label>Área</label>
<select id="departamentoSelect" name="departamento" required>

<option disabled selected>Seleccione</option>
<option value="Administracion">Administración</option>
<option value="ACAI">ACAI</option>
<option value="Colegio">Colegio</option>
<option value="Cocina">Cocina</option>
<option value="Finca">Finca</option>
<option value="Formador Humano">Formador Humano</option>
<option value="Frailes">Frailes</option>
<option value="Miscelaneos">Misceláneos</option>

</select>

<label>Categoría</label>

<select id="categoriaSelect" name="categoria" required>

<option disabled selected>Seleccione</option>
<option>Hardware</option>
<option>Software</option>
<option>Red</option>
<option>Infraestructura</option>
<option>Servicios</option>

</select>

<label>Ubicación del inconveniente</label>
<input id="lugarTxt" name="lugar" required>

<label>Número de Ticket</label>
<input id="consecutivo" name="consecutivo" readonly>

<label>Inconveniente</label>
<textarea id="mensajeTxt" name="comentarios" required></textarea>

<p class="centrado" id="mensajeAlert"></p>

<input type="submit" value="Enviar" class="botones">

</form>

</div>
</div>

<footer style="background:#002060;color:white;text-align:center;padding:20px">
Ciudad de Los Niños - Departamento de TI
</footer>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>

document.addEventListener("DOMContentLoaded",function(){

const form=document.getElementById("form1");
const mensaje=document.getElementById("mensajeAlert");
const consecutivo=document.getElementById("consecutivo");

emailjs.init("2IIMj-dN305Vw_6cq");

function generarTicket(){

const numero=Math.floor(1000+Math.random()*9000);
consecutivo.value="TICKET-"+numero;

}

generarTicket();

form.addEventListener("submit",function(e){

e.preventDefault();

mensaje.innerHTML="Enviando ticket...";
mensaje.style.color="#002060";

emailjs.sendForm(
"service_j79fepy",
"template_a2zgzqj",
form
)

.then(function(){

mensaje.innerHTML="Ticket enviado correctamente";
mensaje.style.color="green";

form.reset();

generarTicket();

})

.catch(function(error){

console.log(error);

mensaje.innerHTML="Error al enviar el ticket";
mensaje.style.color="red";

});

});

});

</script>

</body>
</html>
