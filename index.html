<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ciudad de Los Niños - Sistema de Tickets CDN</title>
    <link rel="icon" href="https://www.ciudaddelosninoscr.org/pics/header-logo.png" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
      body { background-color: #f5f5f5; color: #002060; line-height: 1.6; }
      header { background-color: #002060; color: white; padding: 1rem 0; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
      .header-container { width: 90%; max-width: 1200px; margin: 0 auto; display: flex; align-items: center; }
      .section { padding: 3rem 0; width: 90%; max-width: 1200px; margin: 0 auto; }
      .page-title { text-align: center; margin-bottom: 2rem; }
      .formulario-contacto { background-color: white; padding: 2rem; border-radius: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border-top: 4px solid #e61610; }
      form { display: flex; flex-direction: column; gap: 1.2rem; }
      label { font-weight: 600; }
      input, select, textarea { width: 100%; padding: 0.8rem; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; }
      textarea { min-height: 120px; resize: vertical; }
      .botones { background-color: #e61610; color: white; border: none; padding: 0.8rem 1.5rem; font-weight: 700; border-radius: 4px; cursor: pointer; align-self: flex-start; }
      .botones:hover { background-color: #c01209; }
      .centrado { text-align: center; margin-top: 1rem; font-weight: 700; }
      footer { background-color: #002060; color: white; padding: 2rem 0; margin-top: 3rem; }
      .footer-container { width: 90%; max-width: 1200px; margin: 0 auto; }
    </style>
  </head>
  <body>
    <header>
      <div class="header-container">
        <img src="https://www.ciudaddelosninoscr.org/pics/header-logo.png" alt="logo" width="250" />
      </div>
    </header>

    <div class="section">
      <div class="page-title">
        <h1>Sistema de Tickets CDN</h1>
        <p>Complete el formulario para crear un nuevo ticket</p>
      </div>

      <div class="formulario-contacto">
        <form id="form_tickets">
          <label>Nombre Completo:</label>
          <input id="nombreTxt" name="nombre" type="text" required />

          <label>Área:</label>
          <select id="departamentoSelect" name="departamento" required>
            <option value="" disabled selected>Seleccione un departamento</option>
            <option value="Administracion">Administración</option>
            <option value="Admin-Colegio">Admin-Colegio</option>
            <option value="ACAI">ACAI</option>
            <option value="Colegio-Profesores">Colegio-Profesores</option>
            <option value="Cocina">Cocina</option>
            <option value="Finca">Finca</option>
            <option value="Formador Humano">Formador Humano</option>
            <option value="Frailes">Frailes</option>
            <option value="Miscelaneos">Misceláneos</option>
          </select>

         <label for="categoriaSelect">Categoría:</label>
          <select id="categoriaSelect" name="categoria" required>
            <option value="" disabled selected>Seleccione una categoría</option>
            <option value="Hardware">Hardware</option>
            <option value="Software">Software</option>
            <option value="Red">Red</option>
            <option value="Cocina">Cocina</option>
            <option value="Finca">Finca</option>
            <option value="Infraestructura">Infraestructura</option>
            <option value="Servicios">Servicios</option>
            <option value="Aula">Aula</option>
            <option value="Cloud Campus">Cloud Campus</option>
            <option value="Chromebook">Chromebook</option>
          </select>

          <label>Ubicación:</label>
          <input id="lugarTxt" name="lugar" type="text" required />

          <label>Número de Ticket:</label>
          <input type="text" id="consecutivo" name="consecutivo" readonly />

          <label>Inconveniente:</label>
          <textarea id="mensajeTxt" name="comentarios" required></textarea>

          <p class="centrado" id="mensajeAlert"></p>
          <input type="submit" value="Enviar Ticket" class="botones" id="btnSend" />
        </form>
      </div>
    </div>

    <footer>
      <div class="footer-container">
        <p>&copy; 2026 Ciudad de Los Niños. TI - Soporte Interno.</p>
        <p><i class="fas fa-map-marker-alt"></i> Agua Caliente de Cartago, Costa Rica</p>
          <p><i class="fas fa-envelope"></i> ti@ciudaddelosninoscr.org</p>
          <p>&copy; Todos los derechos reservados.</p>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script>
      (function() {
        emailjs.init('2IIMj-dN305Vw_6cq');
      })();

      document.addEventListener('DOMContentLoaded', () => {
        const form = document.getElementById('form_tickets');
        const mensaje = document.getElementById('mensajeAlert');
        const consecutivoInput = document.getElementById('consecutivo');

        function generarTicket() {
          const id = 'TICKET-' + Math.floor(1000 + Math.random() * 9000);
          consecutivoInput.value = id;
        }
        generarTicket();

        form.addEventListener('submit', function(event) {
          event.preventDefault();
          
          mensaje.textContent = "Enviando...";
          mensaje.style.color = "#002060";

          // Guardamos datos para APEX (por si acaso quieres enviarlos)
          const datos = {
            nombre: document.getElementById('nombreTxt').value,
            departamento: document.getElementById('departamentoSelect').value,
            consecutivo: consecutivoInput.value
          };

          // 1. ENVIAR CORREO (Lo más importante)
          emailjs.sendForm('service_j79fepy', 'template_a2zgzqj', this)
            .then(() => {
              // ÉXITO: Mostramos el mensaje verde inmediatamente
              mensaje.textContent = "¡Ticket enviado con éxito!";
              mensaje.style.color = "green";
              
              // Intentamos enviar a APEX "en silencio" para que no genere error visual
              fetch('https://oracleapex.com/ords/api_tickets/tickets_internos/', {
                method: 'POST',
                mode: 'no-cors', // ESTO SILENCIA EL ERROR DE FETCH
                body: JSON.stringify(datos)
              }).catch(() => {}); // Ignoramos cualquier error de red aquí

              form.reset();
              generarTicket();
            })
            .catch((err) => {
              console.error("Error EmailJS:", err);
              mensaje.textContent = "Error al enviar. Intente de nuevo.";
              mensaje.style.color = "red";
            });
        });
      });
    </script>
  </body>
</html>
