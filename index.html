<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ciudad de Los Niños - Sistema de Tickets Internos</title>
    <link rel="icon" href="https://www.ciudaddelosninoscr.org/pics/header-logo.png" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
      /* Estilos generales */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Montserrat', sans-serif;
      }

      body {
        background-color: #f5f5f5;
        color: #002060;
        line-height: 1.6;
      }

      /* Header */
      header {
        background-color: #002060;
        color: white;
        padding: 1rem 0;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
      }

      .header-container {
        width: 90%;
        max-width: 1200px;
        margin: 0 auto;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .logo-container {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      /* Contenido principal */
      .section {
        padding: 3rem 0;
        width: 90%;
        max-width: 1200px;
        margin: 0 auto;
      }

      .page-title {
        text-align: center;
        margin-bottom: 2rem;
        color: #002060;
      }

      .page-title h1 {
        font-size: 2rem;
        font-weight: 700;
      }

      .page-title p {
        font-size: 1.1rem;
        color: #444;
      }

      /* Formulario */
      .formulario-contacto {
        background-color: white;
        padding: 2rem;
        border-radius: 8px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        border-top: 4px solid #e61610;
      }

      form {
        display: flex;
        flex-direction: column;
        gap: 1.2rem;
      }

      label {
        font-weight: 600;
        color: #002060;
        margin-bottom: 0.3rem;
        display: block;
      }

      input, textarea, select {
        width: 100%;
        padding: 0.8rem;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 1rem;
      }

      .botones {
        background-color: #e61610;
        color: white;
        border: none;
        padding: 0.8rem 1.5rem;
        font-weight: 600;
        border-radius: 4px;
        cursor: pointer;
        transition: background-color 0.3s ease;
        align-self: flex-start;
      }

      .botones:hover {
        background-color: #c01209;
      }

      .centrado {
        text-align: center;
        margin-top: 1rem;
        font-weight: 600;
      }

      /* Footer */
      .footer {
        background-color: #002060;
        color: white;
        padding: 2rem 0;
        margin-top: 2rem;
      }

      .footer-container {
        width: 90%;
        max-width: 1200px;
        margin: 0 auto;
      }
    </style>
  </head>

  <body>
    <header>
      <div class="header-container">
        <div class="logo-container">
          <img src="https://www.ciudaddelosninoscr.org/pics/header-logo.png" alt="logo" width="300" />
        </div>
      </div>
    </header>

    <div class="section">
      <div class="page-title">
        <h1>Sistema de Tickets Internos</h1>
        <p>Complete TODOS los campos del formulario para crear un nuevo ticket</p>
      </div>

      <div class="formulario-contacto">
        <form id="form1">
          <label for="nombreTxt">Nombre Completo:</label>
          <input id="nombreTxt" name="nombre" type="text" placeholder="Escriba su nombre completo" required />

          <label for="departamentoSelect">Área:</label>
          <select id="departamentoSelect" name="departamento" required>
            <option value="" disabled selected>Seleccione un departamento</option>
            <option value="Administracion">Administración</option>
            <option value="ACAI">ACAI</option>
            <option value="Colegio-Profesores">Colegio-Profesores</option>
            <option value="Cocina">Cocina</option>
            <option value="Finca">Finca</option>
            <option value="Formador Humano">Formador Humano</option>
            <option value="Frailes">Frailes</option>
            <option value="Miscelaneos">Misceláneos</option>
          </select>

          <label for="categoriaSelect">Categoría:</label>
          <select id="categoriaSelect" name="categoria" required>
            <option value="" disabled selected>Seleccione una categoría</option>
            <option value="Hardware">Hardware</option>
            <option value="Software">Software</option>
            <option value="Red">Red</option>
            <option value="Cocina">Cocina</option>
            <option value="Finca">Finca</option>
            <option value="Infraestructura">Infraestructura</option>
            <option value="Servicios">Servicios</option>
            <option value="Aula">Aula</option>
            <option value="Cloud Campus">Cloud Campus</option>
            <option value="Chromebook">Chromebook</option>
          </select>

          <label for="lugarTxt">Ubicación del inconveniente:</label>
          <input id="lugarTxt" name="lugar" type="text" placeholder="Describa la ubicación" required />

          <label for="consecutivo">Número de Ticket:</label>
          <input type="text" id="consecutivo" name="consecutivo" readonly />

          <label for="mensajeTxt">Inconveniente:</label>
          <textarea id="mensajeTxt" name="comentarios" placeholder="Describa detalladamente su problema o solicitud" required></textarea>

          <p class="centrado" id="mensajeAlert"></p>
          <input type="submit" value="Enviar" class="botones" id="btnSend" />
        </form>
      </div>
    </div>

    <footer class="footer">
      <div class="footer-container">
          <h3>Contacto</h3>
          <p><i class="fas fa-map-marker-alt"></i> Agua Caliente de Cartago, Costa Rica</p>
          <p><i class="fas fa-envelope"></i> ti@ciudaddelosninoscr.org</p>
          <p>&copy; 2025 Ciudad de Los Niños. Todos los derechos reservados.</p>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        const form = document.getElementById('form1');
        const mensaje = document.getElementById('mensajeAlert');
        const consecutivoInput = document.getElementById('consecutivo');
        
        // URL de tu API REST de APEX
        const urlAPEX = 'https://oracleapex.com/ords/api_tickets/tickets_internos/';

        // Inicializar EmailJS con tu ID
        emailjs.init('2IIMj-dN305Vw_6cq');

        function generarTicket() {
          const numeroAleatorio = Math.floor(1000 + Math.random() * 9000);
          consecutivoInput.value = 'TICKET-' + numeroAleatorio;
        }

        generarTicket();

        form.addEventListener('submit', function(event) {
          event.preventDefault();

          mensaje.textContent = 'Enviando ticket...';
          mensaje.style.color = '#002060';

          // 1. Preparar datos para APEX
          const datosFormulario = {
            nombre: document.getElementById('nombreTxt').value,
            departamento: document.getElementById('departamentoSelect').value,
            categoria: document.getElementById('categoriaSelect').value,
            lugar: document.getElementById('lugarTxt').value,
            consecutivo: consecutivoInput.value,
            mensaje: document.getElementById('mensajeTxt').value,
          };

          // 2. Intentar guardar en APEX primero (Segundo plano)
          fetch(urlAPEX, {
            method: 'POST',
            mode: 'no-cors', // Evita el error "Failed to fetch" si el servidor no tiene CORS configurado
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(datosFormulario),
          }).catch(err => console.log("Nota: Error de conexión con APEX, pero intentando enviar correo..."));

          // 3. Enviar correo con EmailJS (Lo que te funciona)
          emailjs.sendForm('service_j79fepy', 'template_a2zgzqj', form)
            .then(() => {
              mensaje.textContent = '¡Ticket enviado correctamente!';
              mensaje.style.color = 'green';
              form.reset();
              generarTicket();
            })
            .catch((error) => {
              console.error('Error EmailJS:', error);
              mensaje.textContent = 'Hubo un error al enviar el correo.';
              mensaje.style.color = 'red';
            });
        });
      });
    </script>
  </body>
</html>
